services:
  postgres:
    image: postgres:16-alpine
    container_name: ducky-postgres
    environment:
      POSTGRES_DB: ducky
      POSTGRES_USER: ducky
      POSTGRES_PASSWORD: ducky_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ducky"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build: .
    container_name: ducky-server
    ports:
      - "3000:3000"
      - "3001:3001"
    environment:
      NODE_ENV: development
      PORT: 3000
      TUNNEL_PORT: 3001
      BASE_DOMAIN: localhost
      LOG_LEVEL: info
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: ducky
      DATABASE_USER: ducky
      DATABASE_PASSWORD: ducky_password
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./packages/server/dist:/app/packages/server/dist
      - ./packages/shared/dist:/app/packages/shared/dist
      - ./packages/database/dist:/app/packages/database/dist

volumes:
  postgres_data:
