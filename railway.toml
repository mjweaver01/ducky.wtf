# Railway — root config (fallback if a service has no custom config path).
# Prefer per-service configs so each service gets the right Dockerfile:
#
#   Service              | Config file path (set in Railway dashboard)
#   @ducky/server        | /railway.server.toml
#   @ducky/web-backend   | /railway.web-backend.toml
#   @ducky/web-frontend  | /railway.web-frontend.toml
#
# Each of those files sets builder, dockerfilePath, and watchPatterns = ["**"]
# so any push triggers a deploy and the correct Dockerfile is used.
#
# Root directory must stay empty for all services (build context = repo root).
# Env vars (DATABASE_URL, JWT_SECRET, VITE_API_URL, etc.) set in dashboard.

[build]
builder = "DOCKERFILE"
# Trigger on any change when using this root config
watchPatterns = ["**"]
