# Railway — set Dockerfile path per service in the dashboard (not this file).
#
#   Service              | Dockerfile path
#   @ducky/server        | Dockerfile
#   @ducky/web-backend   | Dockerfile.web-backend
#   @ducky/web-frontend  | Dockerfile.web-frontend
#
# Root directory = empty for all. Env vars (DATABASE_URL, JWT_SECRET, VITE_API_URL, etc.) in dashboard.

[build]
builder = "DOCKERFILE"
watchPatterns = ["**"]
