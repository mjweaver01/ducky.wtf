name: CI

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '25'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run E2E tests
        run: |
          chmod +x test-e2e.sh
          timeout 180 ./test-e2e.sh || exit 1

  notify:
    name: Notify CI Status
    runs-on: ubuntu-latest
    needs: [build-and-test]
    if: always()

    steps:
      - name: CI Passed
        if: needs.build-and-test.result == 'success'
        run: echo "CI passed. Railway auto-deploys when connected to this repo."

      - name: CI Failed
        if: needs.build-and-test.result != 'success'
        run: |
          echo "CI failed!"
          exit 1
