name: Deploy to Railway

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '25'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run E2E tests
        run: |
          chmod +x test-e2e.sh
          timeout 180 ./test-e2e.sh || exit 1

  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: build-and-test
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      # BUILD_REV forces Docker to rebuild (ARG in Dockerfiles); avoids "no change detected" skipping the build
      BUILD_REV: ${{ github.sha }}
      SVC_TUNNEL: ${{ vars.RAILWAY_SERVICE_TUNNEL_SERVER || '@ducky/server' }}
      SVC_BACKEND: ${{ vars.RAILWAY_SERVICE_WEB_BACKEND || '@ducky/web-backend' }}
      SVC_FRONTEND: ${{ vars.RAILWAY_SERVICE_WEB_FRONTEND || '@ducky/web-frontend' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy tunnel-server
        run: railway up --service ${{ env.SVC_TUNNEL }} --ci

      - name: Deploy web-backend
        run: railway up --service ${{ env.SVC_BACKEND }} --ci

      - name: Deploy web-frontend
        run: railway up --service ${{ env.SVC_FRONTEND }} --ci

  notify:
    name: Notify Deployment Status
    runs-on: ubuntu-latest
    needs: [deploy]
    if: always()

    steps:
      - name: Deployment Success
        if: needs.deploy.result == 'success'
        run: echo "Deployment to Railway successful!"

      - name: Deployment Failed
        if: needs.deploy.result != 'success'
        run: |
          echo "Deployment failed!"
          exit 1
