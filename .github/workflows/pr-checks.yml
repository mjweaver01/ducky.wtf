name: Pull Request Checks

on:
  pull_request:
    branches:
      - master

jobs:
  lint-and-build:
    name: Lint and Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '25'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Check for build artifacts
        run: |
          if [ ! -d "packages/server/dist" ]; then
            echo "Server build failed"
            exit 1
          fi
          if [ ! -d "packages/cli/dist" ]; then
            echo "CLI build failed"
            exit 1
          fi
          echo "Build artifacts present"

  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '25'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run E2E tests
        run: |
          chmod +x test-e2e.sh
          timeout 180 ./test-e2e.sh || exit 1

  docker-build:
    name: Test Docker Builds
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build tunnel-server image
        run: docker build -t ducky-server:test .

      - name: Build web-backend image
        run: docker build -f Dockerfile.web-backend -t ducky-backend:test .

      - name: Build web-frontend image
        run: docker build -f Dockerfile.web-frontend --build-arg VITE_API_URL=http://localhost:3002 -t ducky-frontend:test .

      - name: Test tunnel-server container starts
        run: |
          docker run --rm -d --name test-server \
            -e VALID_TOKENS=test-token \
            ducky-server:test
          sleep 5
          if docker ps | grep test-server; then
            echo "Container running"
            docker stop test-server
          else
            echo "Container failed to start"
            docker logs test-server
            exit 1
          fi
